<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Code Black Student Portal - Home</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="A student portal for Code Black Tech organization">
        <meta name="keywords" content="code, black, tech, code black tech, students, portal, student portal, 
            code black student portal, connect, career, resources, networking">
        <meta name="robots" content="nofollow">
        <meta name="pragma" content="no-cache">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" 
                rel="stylesheet">
        <link href="portal.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
        <script defer src="script.js"></script>
    </head>
    <body style="background-image: url(images/classroom_1.png); background-size: cover; background-position: center; 
        background-repeat: no-repeat; background-attachment: fixed;">
        <header class="mt-5">
            <img src="images/code_black.png" alt="code black tech organization logo" class="figure-img img-fluid mx-auto d-block drop-bounce">
        </header>
        
        <div class="container mt-5" style="overflow-x: hidden;">
            <div class="row justify-content-center">
                <div class="col-xl-8 col-lg-10 text-center hidden-left">
                    <h1 class="fw-bold" style="font-size: 48pt; color:rgb(66, 10, 66); -webkit-text-stroke: 
                        .3px black; text-shadow: 0px 0px 10px white;">
                        TECH TALENT PORTAL
                    </h1>
                    <h4 class="fw-bold text-center text-white" style="-webkit-text-stroke: .3px black; text-shadow: 1px 1px 2px black;">
                        A directory of former and current Code Black Tech students, representing a resource of tech talent for hiring managers,
                        potential employers, startup founders, and a network for students to connect and share opportunities.
                    </h4>
                    <br>
                    <div class="nav-buttons">
                        <a href="portal.html" class="btn btn-outline-light">Access The Portal</a>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
